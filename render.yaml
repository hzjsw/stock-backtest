services:
  - type: web
    name: stock-backtest-api
    env: node
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/health
    numInstances: 1
    disk:
      sizeGB: 1
      mountPath: /data
